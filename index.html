<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Nova Scanner | Clasificador</title>
    <style>
        :root {
            --primary: #2D5A27;
            --accent: #FFD700;
            --white: #ffffff;
            --bg: #f0f4f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem; }
        
        #status { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }

        #webcam-container {
            margin: 0 auto 1.5rem;
            width: 300px;
            height: 300px;
            border: 4px solid var(--primary);
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        button {
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }

        #label-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prediction-bar {
            background: #eee;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: left;
            border-left: 5px solid var(--primary);
        }

        /* Sección de la Caneca */
        #recommendation-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none; /* Se activa al iniciar */
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌿 Terra Nova</h1>
        <p id="status">Sistema de IA para clasificación de residuos</p>
        
        <button type="button" onclick="init()">ENCENDER ESCÁNER</button>
        
        <div id="webcam-container"></div>

        <div id="recommendation-box">
            Destino: <span id="caneca-tipo">---</span>
        </div>

        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/YTyc-7h11/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            try {
                document.getElementById('status').innerText = "Cargando modelo...";
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(300, 300, false); // false para evitar efecto espejo
                await webcam.setup(); 
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                document.getElementById("recommendation-box").style.display = "block";
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    let div = document.createElement("div");
                    div.className = "prediction-bar";
                    labelContainer.appendChild(div);
                }
                document.getElementById('status').innerText = "✅ Escáner en línea";
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestProb = 0;
            let bestMatch = "";

            for (let i = 0; i < maxPredictions; i++) {
                const prob = prediction[i].probability;
                const className = prediction[i].className;
                
                labelContainer.childNodes[i].innerHTML = `${className}: ${(prob * 100).toFixed(0)}%`;

                if (prob > highestProb) {
                    highestProb = prob;
                    bestMatch = className;
                }
            }

            actualizarCaneca(bestMatch, highestProb);
        }

        function actualizarCaneca(clase, probabilidad) {
            const box = document.getElementById("recommendation-box");
            const texto = document.getElementById("caneca-tipo");

            if (probabilidad < 0.6) {
                texto.innerText = "Analizando...";
                box.style.background = "#ddd";
                box.style.color = "#333";
                return;
            }

            // LÓGICA DE CANECAS (Basada en tus etiquetas de Teachable Machine)
            if (clase === "Aprovechables") {
                texto.innerText = "CANECA BLANCA (Plástico, vidrio, metal)";
                box.style.background = "#ffffff";
                box.style.color = "#000";
                box.style.border = "2px solid #ccc";
            } else if (clase === "No aprovechables") {
                texto.innerText = "CANECA NEGRA (Papel higiénico, servilletas sucias)";
                box.style.background = "#333";
                box.style.color = "#fff";
                box.style.border = "none";
            } else if (clase === "Orgánicos") {
                texto.innerText = "CANECA VERDE (Restos de comida, desechos agrícolas)";
                box.style.background = "#2D5A27";
                box.style.color = "#fff";
                box.style.border = "none";
            }
        }
    </script>
</body>
</html>
