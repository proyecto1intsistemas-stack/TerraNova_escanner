<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f0; margin: 0; padding: 10px; }
        #webcam-container { margin: 10px auto; border: 4px solid #2D5A27; width: 250px; height: 250px; background: #000; border-radius: 10px; }
        button { padding: 15px; background: #FFD700; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; }
        #label-container { margin-top: 10px; font-size: 16px; font-weight: bold; color: #2D5A27; }
    </style>
</head>
<body>
    <button type="button" onclick="init()">ENCENDER CÁMARA</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/YTyc-7h11/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            try {
                // Intentamos pedir permiso directamente al navegador
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(250, 250, false); 
                await webcam.setup(); 
                await webcam.play();
                
                window.requestAnimationFrame(loop);
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (error) {
                alert("Error: Wix requiere que publiques el sitio para usar la cámara.");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
